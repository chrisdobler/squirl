services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ~/.squirl/chroma:/chroma/chroma
    restart: unless-stopped
  # Streamlit Chroma viewer. Open http://<docker-host>:3001.
  chroma-admin:
    image: squirl-chroma-admin:local
    build: ./chroma-viewer
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    ports:
      - "3001:8501"
    depends_on:
      - chroma
    restart: unless-stopped
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: vectoradmin
      POSTGRES_PASSWORD: vectoradmin
      POSTGRES_DB: vectoradmin
    ports:
      - "5432:5432"
